<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>


    <!-- taiwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<section>
    <div class="max-w-6xl w-[95%] mx-auto flex flex-col md:flex-row justify-between items-center my-6 md:my-10 border-white shadow-xl rounded-lg p-6 gap-4">
        <div class="flex gap-2 md:gap-3 overflow-x-auto w-full md:w-auto pb-2 md:pb-0">
            <button id="all-btn" class="btn btn-primary flex-1 md:w-20">All</button>
            <button id="open-btn" class="btn flex-1 md:w-20">Open</button>
            <button id="closed-btn" class="btn flex-1 md:w-20">Closed</button>
        </div>

        <div class="flex gap-2 w-full md:w-auto">
            <input id="search-input" type="text" placeholder="Search issues" class="input input-bordered grow md:w-auto">
            <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
    </div>
</section>

<section class="border-white shadow-lg">
    <div class="flex flex-col md:flex-row justify-between items-center max-w-6xl w-[95%] mx-auto border-b p-6 border-white shadow-xl rounded-lg gap-4">
        <div class="flex items-center gap-4">
            <img src="./assets/Aperture.png" alt="" class="w-12 h-12">
            <div>
                <p id="issues-count" class="font-semibold text-xl md:text-[20px]">50 Issues</p>
                <p class="font-normal text-sm md:text-[16px]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-5 text-sm font-medium">
            <p class="flex items-center justify-center gap-1"><span class="text-green-500 text-6xl leading-none">.</span>Open</p>
            <p class="flex items-center justify-center gap-1"><span class="text-purple-500 text-6xl leading-none">.</span>Closed</p>
        </div>
    </div>

    <div id="loading-spinner" class="hidden flex justify-center items-center my-20">
        <span class="loading loading-infinity loading-xl text-primary"></span>
    </div>

    <div id="issues-container" class="max-w-6xl w-[95%] mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-10 mb-10">
        </div>    
</section>



<script src="home.js"></script>

</body>
</html>
